<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbus Presentation - Compact Mode</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0b1426;
            --airbus-blue: #00205b;
            --accent-blue: #005587;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Utilise toute la hauteur de l'écran */
            overflow: hidden;
        }

        #pres-container {
            width: 75%; /* Taille réduite pour l'écran */
            max-width: 850px;
            background: var(--card-bg);
            border: 1px solid #1a263f;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            text-align: center;
        }

        h1 {
            font-weight: 300;
            font-size: 1.5rem; /* Titre plus compact */
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-blue);
            padding-left: 12px;
            text-align: left;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        .img-frame {
            width: 100%;
            height: 380px; /* Hauteur réduite pour éviter le scroll */
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #1f2d4d;
        }

        .img-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease-in-out;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #1f2d4d;
            padding-top: 15px;
        }

        .counter {
            font-family: monospace;
            color: var(--text-dim);
            font-weight: bold;
            font-size: 1rem;
        }

        button {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--accent-blue);
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-blue);
        }

        button:disabled {
            border-color: #2a3b5a;
            color: #2a3b5a;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id="pres-container">
    <h1 id="slide-title">Loading...</h1>
    
    <div class="img-frame">
        <img id="slide-img" src="" alt="Presentation Visual">
    </div>

    <div class="nav-bar">
        <button id="prevBtn" onclick="moveSlide(-1)">Previous</button>
        <div class="counter" id="slide-num">1 / 6</div>
        <button id="nextBtn" onclick="moveSlide(1)">Next</button>
    </div>
</div>

<script>
    const slides = [
        {
            title: "QLB: Digital Precision & Reporting",
            img: "https://www.airbus.com/sites/g/files/jlcbta136/files/styles/w1200h675/public/2024-04/professionals_4images.jpg?h=0e6c0790&itok=HdJOVpAt"
        },
        {
            title: "QLB: Validating Quality in Real-Time",
            img: "https://www.airbus.com/sites/g/files/jlcbta136/files/styles/w750h1140/public/2024-03/saru_paid_media_production_manufacturing_2022.jpg?h=cf932d48&itok=ceBjOFDy"
        },
        {
            title: "ZEROe: Shaping the 2035 Hydrogen Future",
            img: "https://media.lesechos.com/api/v1/images/view/654cc2c64c6ee00a9476218a/1280x720/0903343902189-web-tete.jpg"
        },
        {
            title: "ZEROe: The Challenge of Global Infrastructure",
            img: "https://www.internationalairportreview.com/wp-content/uploads/Hydrogen.jpg" 
        },
        {
            title: "2025: Strengthening Strategic Partnerships",
            img: "https://innovations.fr/wp-content/uploads/2025/03/airbus-signe-un-coup-majeur-avec-un-client-americain.jpeg"
        },
        {
            title: "2025: Logistics & Supply Chain Fragility",
            img: "https://www.leparisien.fr/resizer/9e62zQ-ss_JhkfbGitGaz8WpjxM=/932x582/cloudfront-eu-central-1.images.arcpublishing.com/leparisien/X2JL2OYWZRER7CSD7MIDWEAQCE.jpg"
        }
    ];

    let currentIndex = 0;

    function renderSlide() {
        const slide = slides[currentIndex];
        const img = document.getElementById('slide-img');
        
        img.style.opacity = 0;
        
        setTimeout(() => {
            document.getElementById('slide-title').innerText = slide.title;
            img.src = slide.img;
            document.getElementById('slide-num').innerText = (currentIndex + 1) + " / " + slides.length;
            img.style.opacity = 1;
        }, 150);

        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === slides.length - 1);
    }

    function moveSlide(direction) {
        currentIndex += direction;
        renderSlide();
    }

    window.onload = renderSlide;
</script>

</body>
</html>
